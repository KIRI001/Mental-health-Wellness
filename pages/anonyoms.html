<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Wall | MHW Companion</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Accessible Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- GSAP & Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link rel="stylesheet" href="../css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans pt-24">

    <canvas id="three-canvas"></canvas>

    <div id="navbar-placeholder"></div>

    <header class="pt-40 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div
                class="inline-flex items-center gap-2 bg-blue-50 text-blue-600 px-5 py-2.5 rounded-full text-[9px] font-black uppercase tracking-[0.2em] border border-blue-100 mb-10">
                Private Warrior Sanctum
            </div>
            <h1
                class="font-display text-5xl md:text-8xl font-black text-slate-900 mb-10 uppercase italic leading-none tracking-tighter">
                Whispers <br class="md:hidden"> of the <span
                    class="text-blue-600 underline decoration-blue-100 decoration-8 underline-offset-8">Heart</span>
            </h1>
            <p class="text-xl md:text-2xl text-slate-600 max-w-3xl leading-relaxed font-medium">
                An anonymous space where every truth is valid and every heart is seen. Speak your silence and find your
                community.
            </p>
        </div>
    </header>

    <main class="pb-40">
        <div class="max-w-6xl mx-auto px-6">
            <!-- Input Section -->
            <div class="share-card bg-white p-12 md:p-20 rounded-[3.5rem] border border-slate-100 shadow-3xl mb-32 relative overflow-hidden group shadow-slate-200/50"
                id="share-section">
                <div class="flex flex-col items-center py-20">
                    <i class="ri-loader-4-line animate-spin text-blue-600 text-6xl mb-8"></i>
                    <h3 class="text-2xl font-black text-slate-900 mb-10 uppercase tracking-tight">Syncing with our
                        sanctuary...</h3>
                </div>
            </div>

            <div class="flex items-center justify-between mb-16">
                <h2 class="font-display text-3xl font-black text-slate-900 uppercase">Latest <span
                        class="text-blue-500 italic">Whispers</span></h2>
                <div
                    class="h-10 px-6 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 text-[10px] font-black uppercase tracking-widest">
                    Live Feedback Loop</div>
            </div>

            <!-- Wall Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="wall-grid">
                <!-- Dynamically populated by our script -->
            </div>
        </div>
    </main>

    <div id="footer-placeholder" class="mt-auto"></div>

    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') ? 'http://localhost:3000' : '';
        const shareSection = document.getElementById('share-section');
        const wallGrid = document.getElementById('wall-grid');
        const userId = localStorage.getItem('user_id');

        const setupShareUI = () => {
            if (userId) {
                shareSection.innerHTML = `
                    <div class="relative z-10 flex flex-col items-center">
                        <div class="h-2 w-48 bg-blue-100 rounded-full mb-12"></div>
                        <h3 class="font-display text-3xl md:text-5xl font-black text-slate-900 mb-12 text-center uppercase tracking-tighter">What's on your <span class="text-blue-600 italic">mind?</span></h3>
                        <textarea id="anonymous-thought" class="w-full bg-slate-50 p-12 rounded-[50px] border border-slate-50 outline-none focus:ring-[15px] focus:ring-blue-100/50 focus:bg-white text-2xl font-medium transition-all text-slate-800 placeholder:text-slate-300 resize-none min-h-[250px] leading-relaxed" placeholder="Write your truth anonymously..."></textarea>
                        <div class="mt-12 flex flex-col md:flex-row items-center justify-between w-full gap-8">
                            <div class="flex items-center gap-4 text-slate-400">
                                <i class="ri-shield-user-fill text-3xl text-blue-600/30"></i>
                                <span class="text-[10px] font-black uppercase tracking-[0.3em]">End-to-End Privacy Active</span>
                            </div>
                            <button class="w-full md:w-auto bg-blue-600 text-white px-16 py-6 rounded-3xl text-xl font-black shadow-2xl shadow-blue-200 hover:bg-slate-900 transition-all hover:scale-105 active:scale-95 group/btn" id="post-thought">
                                Post to Wall <i class="ri-sparkling-fill ml-2 group-hover/btn:rotate-12 transition-transform"></i>
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('post-thought').addEventListener('click', handlePost);
            } else {
                shareSection.innerHTML = `
                    <div class="text-center relative z-10 py-10">
                        <div class="h-24 w-24 bg-blue-50 rounded-[40px] flex items-center justify-center mx-auto mb-12 text-blue-600 text-4xl shadow-xl shadow-blue-100 border border-blue-100">
                            <i class="ri-door-lock-fill"></i>
                        </div>
                        <h3 class="text-4xl font-black text-slate-900 mb-6 uppercase tracking-tight">Our Sacred Space</h3>
                        <p class="text-slate-500 text-xl mb-16 max-w-sm mx-auto leading-relaxed font-medium">Please join our community with a secure account to share your journey anonymously.</p>
                        <a href="login.html" class="inline-block bg-blue-600 text-white px-16 py-6 rounded-[30px] text-xl font-black shadow-2xl shadow-blue-200 hover:bg-slate-900 transition-all transform hover:-translate-y-2">Get Started Free</a>
                    </div>
                `;
            }
        };

        const fetchNotes = async () => {
            try {
                const res = await fetch(`${API_BASE}/api/reviews`);
                const data = await res.json();
                wallGrid.innerHTML = '';
                if (!data.reviews || data.reviews.length === 0) {
                    wallGrid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-black uppercase tracking-[0.4em] italic text-sm">Waiting for the first whisper...</div>`;
                    return;
                }
                data.reviews.forEach((review) => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-12 rounded-[40px] border border-slate-100 shadow-2xl shadow-slate-200/50 flex flex-col justify-between transition-all transform hover:-translate-y-4 hover:shadow-blue-200/50 group relative overflow-hidden';
                    card.innerHTML = `
                        <div class="absolute -top-10 -right-10 h-32 w-32 bg-blue-50 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-700"></div>
                        <p class="text-xl font-medium text-slate-700 leading-relaxed italic mb-10 relative z-10">"${review.review}"</p>
                        <div class="flex items-center justify-between border-t border-slate-50 pt-8 mt-auto">
                            <div class="flex items-center gap-3">
                                <div class="h-8 w-8 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-[10px] font-black">W</div>
                                <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Anonymous</span>
                            </div>
                            <span class="text-[10px] font-black text-slate-300">${new Date(review.created_at).toLocaleDateString()}</span>
                        </div>
                    `;
                    wallGrid.appendChild(card);
                });
                gsap.from('.grid > div', { opacity: 0, y: 50, stagger: 0.1, duration: 1.2, ease: "power4.out" });
            } catch (err) {
                console.error(err);
                wallGrid.innerHTML = `
                  <div class="col-span-full py-20 text-center bg-blue-50/50 rounded-[3rem] border border-blue-100">
                    <i class="ri-wifi-off-line text-5xl text-blue-400 mb-6 inline-block"></i>
                    <p class="text-2xl font-bold text-blue-900 mb-2">Connection Problem</p>
                    <p class="text-blue-500 font-medium mb-8">The community heartbeat is offline. Please start the backend server.</p>
                    <code class="bg-white px-6 py-3 rounded-xl text-sm font-mono text-blue-600 border border-blue-100">npm start</code>
                  </div>
                `;
            }
        };

        const handlePost = async () => {
            const thoughtInput = document.getElementById('anonymous-thought');
            const postBtn = document.getElementById('post-thought');
            const text = thoughtInput.value.trim();
            if (!text) return;
            postBtn.disabled = true;
            postBtn.innerHTML = 'Sending...';
            try {
                const res = await fetch(`${API_BASE}/api/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ review: text })
                });
                if (res.ok) {
                    thoughtInput.value = '';
                    fetchNotes();
                }
            } catch (err) { console.error(err); }
            finally {
                postBtn.disabled = false;
                postBtn.innerHTML = 'Post to Wall <i class="ri-sparkling-fill ml-2"></i>';
            }
        };

        setupShareUI();
        fetchNotes();
    </script>
</body>

</html>
